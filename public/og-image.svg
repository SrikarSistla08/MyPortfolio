<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  
  <!-- Terminal window -->
  <rect x="100" y="80" width="1000" height="470" rx="8" fill="#111827" stroke="#374151" stroke-width="2"/>
  
  <!-- Terminal header -->
  <rect x="100" y="80" width="1000" height="40" rx="8" fill="#1F2937"/>
  <rect x="100" y="112" width="1000" height="8" fill="#1F2937"/>
  
  <!-- Traffic lights -->
  <circle cx="130" cy="100" r="6" fill="#EF4444"/>
  <circle cx="150" cy="100" r="6" fill="#FCD34D"/>
  <circle cx="170" cy="100" r="6" fill="#10B981"/>
  
  <!-- Terminal title -->
  <text x="600" y="105" font-family="monospace" font-size="14" fill="#6B7280" text-anchor="middle">srikar@portfolio:~$</text>
  
  <!-- Content -->
  <text x="140" y="180" font-family="monospace" font-size="16" fill="#FCD34D">$</text>
  <text x="160" y="180" font-family="monospace" font-size="16" fill="#9CA3AF">whoami</text>
  
  <!-- Name -->
  <text x="140" y="230" font-family="monospace" font-size="48" font-weight="bold" fill="#FFFFFF">Srikar Sistla</text>
  
  <!-- Title -->
  <text x="140" y="280" font-family="monospace" font-size="20" fill="#4ADE80">Data Science Associate | Full-Stack Developer | Photographer</text>
  
  <!-- Description -->
  <text x="140" y="330" font-family="monospace" font-size="16" fill="#9CA3AF">// Building innovative solutions at the intersection of code and creativity</text>
  
  <!-- Skills -->
  <text x="140" y="380" font-family="monospace" font-size="14" fill="#6B7280">$</text>
  <text x="160" y="380" font-family="monospace" font-size="14" fill="#9CA3AF">cat skills.json | head -5</text>
  
  <!-- Skill tags -->
  <rect x="140" y="400" width="80" height="28" rx="4" fill="#1F2937" stroke="#4ADE80" stroke-width="1"/>
  <text x="180" y="418" font-family="monospace" font-size="12" fill="#4ADE80" text-anchor="middle">Python</text>
  
  <rect x="230" y="400" width="80" height="28" rx="4" fill="#1F2937" stroke="#4ADE80" stroke-width="1"/>
  <text x="270" y="418" font-family="monospace" font-size="12" fill="#4ADE80" text-anchor="middle">React</text>
  
  <rect x="320" y="400" width="80" height="28" rx="4" fill="#1F2937" stroke="#4ADE80" stroke-width="1"/>
  <text x="360" y="418" font-family="monospace" font-size="12" fill="#4ADE80" text-anchor="middle">Next.js</text>
  
  <rect x="410" y="400" width="80" height="28" rx="4" fill="#1F2937" stroke="#4ADE80" stroke-width="1"/>
  <text x="450" y="418" font-family="monospace" font-size="12" fill="#4ADE80" text-anchor="middle">AWS</text>
  
  <rect x="500" y="400" width="80" height="28" rx="4" fill="#1F2937" stroke="#4ADE80" stroke-width="1"/>
  <text x="540" y="418" font-family="monospace" font-size="12" fill="#4ADE80" text-anchor="middle">SQL</text>
  
  <!-- URL -->
  <text x="600" y="520" font-family="monospace" font-size="14" fill="#4ADE80" text-anchor="middle">srikarsistla22.vercel.app</text>
  
  <!-- Cursor blink -->
  <rect x="140" y="460" width="10" height="20" fill="#4ADE80"/>
</svg>
